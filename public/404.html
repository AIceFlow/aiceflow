<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Seite nicht gefunden – AIceFlow</title>
    <meta name="robots" content="noindex" />
    <script type="text/javascript">
      // SPA redirect for GitHub Pages: store path and redirect to index
      var path = window.location.pathname + window.location.search + window.location.hash;
      sessionStorage.redirect = path;
      window.location.replace('/');
    </script>
  </head>
  <body>
    <noscript>
      <h1>Seite nicht gefunden</h1>
      <p>Die angeforderte Seite existiert nicht. <a href="/">Zur Startseite</a></p>
    </noscript>
  </body>
</html>
